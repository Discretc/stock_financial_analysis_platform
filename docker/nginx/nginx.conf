worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct=$upstream_connect_time uht=$upstream_header_time';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 4096;

    # Gzip compression
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json application/xml image/svg+xml
        application/x-font-ttf font/opentype;

    # Security headers (applied globally; per-location overrides below)
    add_header X-Content-Type-Options   "nosniff"           always;
    add_header X-Frame-Options          "DENY"              always;
    add_header X-XSS-Protection         "1; mode=block"     always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(),microphone=(),geolocation=()" always;

    # Rate limiting zones
    limit_req_zone  $binary_remote_addr zone=api:10m     rate=60r/m;
    limit_req_zone  $binary_remote_addr zone=auth:10m    rate=10r/m;
    limit_req_zone  $binary_remote_addr zone=global:10m  rate=300r/m;
    limit_conn_zone $binary_remote_addr zone=connlimit:10m;

    # Upstream services
    upstream backend {
        server backend:8000;
        keepalive 32;
    }

    upstream frontend {
        server frontend:3000;
        keepalive 32;
    }

    # ─── HTTP → HTTPS redirect ────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Allow Let's Encrypt ACME challenge through
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── Main HTTPS server ────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2  on;
        server_name _;

        # SSL — replace paths with your actual certs in production
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout 1d;
        ssl_session_cache   shared:MozSSL:10m;
        ssl_session_tickets off;
        ssl_stapling        on;
        ssl_stapling_verify on;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # Request size limit
        client_max_body_size 10m;

        # Global rate limit
        limit_req  zone=global burst=50 nodelay;
        limit_conn connlimit 20;

        # ── Backend API proxy ─────────────────────────────────────────────────
        location /api/v1/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            proxy_read_timeout    90s;
            proxy_connect_timeout 10s;
            proxy_send_timeout    90s;
        }

        # ── Stricter rate limit for auth endpoints ─────────────────────────
        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;

            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
        }

        # ── WebSocket upgrade ─────────────────────────────────────────────────
        location /api/v1/ws/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 3600s;  # Keep WS connections alive
        }

        # ── Prometheus metrics — internal only ────────────────────────────────
        location /metrics {
            allow  127.0.0.1;
            deny   all;
            proxy_pass http://backend;
        }

        # ── Health check (no rate limit) ──────────────────────────────────────
        location /health {
            proxy_pass http://backend;
            access_log off;
        }

        # ── Next.js static assets — long-lived cache ─────────────────────────
        location /_next/static/ {
            proxy_pass http://frontend;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }

        location /favicon.ico {
            proxy_pass http://frontend;
            access_log off;
        }

        # ── Everything else → Next.js frontend ───────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 60s;
        }
    }
}
